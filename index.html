<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rudresh | Portfolio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body class="dark">

<header class="navbar">
  <div class="logo">&lt; Rudresh /&gt;</div>

  <nav class="nav-links">
    <a href="#home">Home</a>
    <a href="#about">About</a>
    <a href="#services">Services</a>
    <a href="#skills">Skills</a>
    <a href="#contact">Contact</a>
    <button id="themeToggle">🌙</button>
  </nav>
</header>

<section id="home" class="hero reveal">
  <h1>Hi, I'm Rudresh</h1>
  <p class="subtitle">BCA Student | Web Developer</p>

  <div class="hero-buttons">
    <button id="contactBtn">Contact Me</button>
    <button id="skillsBtn">Skills</button>
  </div>
</section>

<section id="about" class="section reveal">
  <h2>About Me</h2>
  <p>I build clean, scalable, and modern web applications.</p>
</section>

<section id="services" class="section reveal">
  <h2>Services</h2>
  <p>Frontend | Backend | Database</p>
</section>

<section id="skills" class="section reveal">
  <h2>Skills</h2>
  <p>HTML, CSS, JavaScript, Node.js, MongoDB</p>
</section>

<section id="contact" class="section contact reveal">
  <h2>Contact Me</h2>
  <form id="contactForm">
    <input type="text" placeholder="Your Name" required>
    <input type="email" placeholder="Your Email" required>
    <textarea placeholder="Message" required></textarea>
    <button type="submit" id="submitBtn">Send Message</button>
  </form>
  <p id="status"></p>
</section>

<script src="script.js"></script>
</body>
</html>
